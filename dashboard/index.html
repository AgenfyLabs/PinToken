<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinToken Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="providers.css" />
  <script src="share-card.js"></script>
</head>
<body>

  <!-- 弹窗外壳 -->
  <div class="window">

  <!-- 顶部导航栏 -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-pin"></span>
      <span class="brand">PinToken</span>
    </div>
    <div class="topbar-right">
      <button class="share-btn" id="shareBtn" title="生成分享卡片">Share</button>
      <button class="close-btn" id="closeBtn" title="关闭">✕</button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="container">

    <!-- Tab 导航栏 -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="analytics">Analytics</button>
      <button class="tab-btn" data-tab="providers">Providers</button>
    </nav>

    <!-- Overview 面板 -->
    <section class="tab-panel" data-tab="overview">

    <!-- 汇总卡片区域 -->
    <section class="cards-grid">

      <!-- 卡片1：今日 Token 用量（高亮） -->
      <div class="card card-highlight">
        <div class="card-label">今日 Token 用量</div>
        <div class="card-value" id="todayTokens">—</div>
        <div class="card-sub">昨日：<span id="yesterdayTokens">—</span></div>
      </div>

      <!-- 卡片2：今日花费 -->
      <div class="card">
        <div class="card-label">今日花费</div>
        <div class="card-value card-value-orange" id="todayCost">—</div>
        <div class="card-sub">昨日：<span id="yesterdayCost">—</span></div>
      </div>

      <!-- 卡片3：本次会话时长 -->
      <div class="card">
        <div class="card-label">本次会话时长</div>
        <div class="card-value" id="sessionTime">—</div>
        <div class="card-sub">当前活跃会话</div>
      </div>

      <!-- 卡片4：累计节省 -->
      <div class="card">
        <div class="card-label">累计节省</div>
        <div class="card-value card-value-green" id="totalSaved">—</div>
        <div class="card-sub">节省比例：<span id="savedPercent">—</span></div>
      </div>

      <!-- 卡片5：本月 vs Max 订阅 -->
      <div class="card" id="subCard">
        <div class="card-label">本月 vs Max 订阅</div>
        <div class="card-value card-value-green" id="subSaved">—</div>
        <div class="card-sub" id="subDetail">—</div>
      </div>

    </section>

    <!-- 高峰状态区域（始终可见） -->
    <section class="status-section" id="statusSection">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="status-info">
        <div class="status-headline" id="statusHeadline">正常</div>
        <div class="status-desc" id="statusDesc">当前所有 Provider 运行正常，API 响应速度稳定，可放心使用</div>
      </div>
    </section>

    <!-- Provider 过滤器 -->
    <section class="filter-bar">
      <button class="filter-btn active" data-provider="">全部</button>
      <button class="filter-btn" data-provider="anthropic">Anthropic</button>
      <button class="filter-btn" data-provider="openai">OpenAI</button>
      <button class="filter-btn" data-provider="xai">xAI</button>
      <button class="filter-btn" data-provider="gemini">Gemini</button>
      <button class="filter-btn" data-provider="moonshot">Moonshot</button>
      <button class="filter-btn" data-provider="qwen">Qwen</button>
      <button class="filter-btn" data-provider="glm">GLM</button>
      <button class="filter-btn" data-provider="deepseek">Deepseek</button>
    </section>

    <!-- 请求明细表格 -->
    <section class="table-wrapper">
      <table class="request-table">
        <thead>
          <tr>
            <th>模型</th>
            <th>Provider</th>
            <th>Token 用量</th>
            <th>占比</th>
            <th>花费</th>
            <th>节省</th>
          </tr>
        </thead>
        <tbody id="requestBody">
          <!-- 由 app.js 动态渲染 -->
        </tbody>
      </table>
    </section>

    </section><!-- /.tab-panel overview -->

    <!-- Analytics 面板 -->
    <section class="tab-panel" data-tab="analytics" style="display:none">
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">近 30 天花费趋势</div>
          <svg id="trendChart" class="chart-svg" viewBox="0 0 600 200"></svg>
        </div>
        <div class="chart-card">
          <div class="chart-title">模型使用分布</div>
          <svg id="modelChart" class="chart-svg" viewBox="0 0 300 200"></svg>
          <div id="modelLegend" class="chart-legend"></div>
        </div>
      </div>
    </section>

    <!-- Providers 面板 -->
    <section class="tab-panel" data-tab="providers" style="display:none">
      <div class="providers-grid" id="providersGrid">
        <!-- 由 providers.js 动态渲染 Provider 卡片 -->
      </div>
    </section>

  </main>

  </div><!-- /.window -->

  <!-- 分享卡片弹窗 -->
  <div class="share-modal" id="shareModal" style="display:none">
    <div class="share-modal-backdrop" id="shareBackdrop"></div>
    <div class="share-modal-content">
      <div class="share-modal-header">
        <span class="share-modal-title">分享你的省钱报告</span>
        <button class="share-modal-close" id="shareClose">✕</button>
      </div>
      <div class="share-modal-preview" id="sharePreview">
        <!-- Canvas 渲染的卡片预览 -->
      </div>
      <div class="share-modal-actions">
        <button class="share-action-btn share-action-download" id="shareDownload">下载图片</button>
        <button class="share-action-btn share-action-upload" id="shareUpload">上传获取链接</button>
      </div>
      <div class="share-link-result" id="shareLinkResult" style="display:none">
        <input class="share-link-input" id="shareLinkInput" readonly />
        <button class="share-link-copy" id="shareLinkCopy">复制</button>
      </div>
      <div class="share-modal-divider"></div>
      <div class="share-modal-label">分享到</div>
      <div class="share-platforms">
        <button class="share-platform" data-platform="twitter" title="X / Twitter">𝕏</button>
        <button class="share-platform" data-platform="reddit" title="Reddit">R</button>
        <button class="share-platform" data-platform="linkedin" title="LinkedIn">in</button>
        <button class="share-platform" data-platform="hackernews" title="Hacker News">Y</button>
        <button class="share-platform" data-platform="copy" title="复制链接">⎘</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="providers.js"></script>
</body>
</html>
